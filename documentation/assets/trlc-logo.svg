<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="220" viewBox="0 0 760 220" role="img" aria-labelledby="title desc">
  <title id="title">TRLC keyboard-style logo</title>
  <desc id="desc">The letters T, R, L, and C each displayed in a grayscale keyboard key box.</desc>

  <rect x="0" y="0" width="760" height="220" fill="#c7c7c7"/>
  <rect x="3" y="3" width="754" height="214" fill="none" stroke="#555555" stroke-width="6"/>

  <g font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="700" text-anchor="middle" dominant-baseline="middle">
    <!-- T -->
    <g transform="translate(40,30)">
      <rect x="0" y="0" width="150" height="160" rx="18" fill="#8f8f8f" stroke="#3a3a3a" stroke-width="4"/>
      <rect x="8" y="8" width="134" height="124" rx="14" fill="#efefef"/>
      <rect x="8" y="132" width="134" height="20" rx="0" fill="#a1a1a1"/>
      <text x="75" y="77" fill="#222222">T</text>
    </g>

    <!-- R -->
    <g transform="translate(220,30)">
      <rect x="0" y="0" width="150" height="160" rx="18" fill="#8f8f8f" stroke="#3a3a3a" stroke-width="4"/>
      <rect x="8" y="8" width="134" height="124" rx="14" fill="#efefef"/>
      <rect x="8" y="132" width="134" height="20" rx="0" fill="#a1a1a1"/>
      <text x="75" y="77" fill="#222222">R</text>
    </g>

    <!-- L -->
    <g transform="translate(400,30)">
      <rect x="0" y="0" width="150" height="160" rx="18" fill="#8f8f8f" stroke="#3a3a3a" stroke-width="4"/>
      <rect x="8" y="8" width="134" height="124" rx="14" fill="#efefef"/>
      <rect x="8" y="132" width="134" height="20" rx="0" fill="#a1a1a1"/>
      <text x="75" y="77" fill="#222222">L</text>
    </g>

    <!-- C -->
    <g transform="translate(580,30)">
      <rect x="0" y="0" width="150" height="160" rx="18" fill="#8f8f8f" stroke="#3a3a3a" stroke-width="4"/>
      <rect x="8" y="8" width="134" height="124" rx="14" fill="#efefef"/>
      <rect x="8" y="132" width="134" height="20" rx="0" fill="#a1a1a1"/>
      <text x="75" y="77" fill="#222222">C</text>
    </g>
  </g>
</svg>
